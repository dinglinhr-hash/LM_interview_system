<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR 後台登入 — Interview Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  
  <!-- Google Sign-In Library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --primary: #C5A25D;
      --primary-hover: #b08e4d;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --text1: #1e293b;
      --text2: #64748b;
      --danger: #ef4444;
      --radius: 12px;
      --card-shadow: 0 10px 25px rgba(0,0,0,.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh; /* dynamic viewport for mobile browsers */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 16px;
      padding: clamp(28px, 6vw, 48px) clamp(20px, 6vw, 40px);
      box-shadow: var(--card-shadow);
    }

    .login-logo {
      text-align: center;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      color: var(--text1);
      letter-spacing: 0.5px;
    }

    .login-logo span { color: var(--primary); }

    .login-subtitle {
      text-align: center;
      margin-top: 8px;
      margin-bottom: 28px;
      color: var(--text2);
      font-size: 14px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text1);
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all .2s;
      /* Prevent iOS zoom on focus (font-size >= 16px triggers zoom) */
      font-size: max(16px, 1em);
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(197, 162, 93, 0.1);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      /* Minimum touch target: 44px */
      min-height: 44px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      margin-bottom: 20px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
    }

    .alert-error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fee2e2;
    }

    .footer-tip {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
    }

    .loading-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0 16px;
      gap: 12px;
      color: var(--text2);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      background: white;
      color: var(--text1);
      border: 1px solid var(--border);
    }

    .btn-google:hover {
      background: #f8f9fa;
      border-color: #d0d5dd;
      transform: translateY(-1px);
    }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Small phone (≤ 380px) ── */
    @media (max-width: 380px) {
      body { padding: 12px; align-items: flex-start; padding-top: 32px; }
      .login-card { border-radius: 12px; }
      .btn { font-size: 14px; }
    }
  </style>
</head>

<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      INTERVIEW <span>PLATFORM</span>
    </div>

    <div class="login-subtitle">HR 後台管理系統</div>

    <div id="error-msg" class="alert alert-error" style="display:none"></div>

    <form id="login-form">
      <div class="form-group">
        <label>管理員 Email</label>
        <input type="email" id="email" placeholder="" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="" required autocomplete="current-password" />
      </div>

      <button type="submit" class="btn btn-primary" id="login-btn" style="margin-top:4px">
        登入系統
      </button>
    </form>

<script>
const loginForm = document.getElementById('login-form');
const loginBtn = document.getElementById('login-btn');
const errorEl = document.getElementById('error-msg');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';

    loginBtn.disabled = true;
    loginBtn.innerHTML = `<span class="loading-spinner"></span> 登入中...`;

    try {
        const form = new FormData();
        form.append('username', document.getElementById('email').value.trim());
        form.append('password', document.getElementById('password').value);

        const res = await fetch('/api/hr/login', {
            method: 'POST',
            body: form,
            credentials: 'include'
        });

        const contentType = res.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            throw new Error(`伺服器錯誤 (${res.status})`);
        }

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.detail || data.message || '登入失敗');
        }

        if (data.ok) {
            window.location.href = '/hr';
            return;
        }
        throw new Error('登入失敗');

    } catch (err) {
        console.error(err);
        errorEl.textContent = err.message || '登入失敗';
        errorEl.style.display = 'block';

        loginBtn.disabled = false;
        loginBtn.innerHTML = '登入系統';
    }
});

async function handleGoogleLogin() {
    window.location.href = '/api/hr/google-login';
}
</script>

</body>
