<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預約紀錄 — Interview Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ══ 頁面容器 ══ */
    .page {
      max-width: 1600px !important;
      width: 96% !important;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    /* ══ 頁首 ══ */
    .page-title-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .page-title-row h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -.02em;
      margin: 0;
      line-height: 1;
    }
    .page-title-row .title-sub {
      font-size: 13px;
      color: #94a3b8;
      padding-bottom: 1px;
    }
    .page-title-row .title-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ══════════════════════════════════════
       搜尋 + 篩選工具列（同一列）
    ══════════════════════════════════════ */

    /* ── 搜尋欄位 ── */
    .search-field {
      position: relative;
      width: 240px;
      flex-shrink: 0;
    }
    .search-field svg.search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #94a3b8;
      z-index: 1;
    }
    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 40px 0 38px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      font-size: 13.5px;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .search-input::placeholder { color: #b0bac8; }
    .search-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      background: #fff;
    }
    .search-input.has-value { border-color: #6366f1; }
    #search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #e2e8f0;
      border: none;
      border-radius: 50%;
      width: 18px; height: 18px;
      cursor: pointer;
      color: #64748b;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: background .12s;
    }
    #search-clear:hover { background: #cbd5e1; color: #0f172a; }

    /* ── 匯出按鈕 ── */
    .btn-export {
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: #374151;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .12s, border-color .12s, box-shadow .12s;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .btn-export:hover {
      background: #f8fafc;
      border-color: #c7d2fe;
      box-shadow: 0 2px 6px rgba(99,102,241,.1);
    }

    /* ── 篩選工具列（含搜尋同一列） ── */
    .filter-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      min-height: 40px;
    }

    /* 分隔線 */
    .filter-divider {
      width: 1px;
      height: 20px;
      background: #e2e8f0;
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ── filter chip（下拉觸發器，外觀像 pill button） ── */
    .filter-chip-wrap { position: relative; }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 32px;
      padding: 0 10px 0 11px;
      border: 1.5px solid #e2e8f0;
      border-radius: 999px;
      background: #fff;
      font-size: 12.5px;
      font-family: inherit;
      color: #374151;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .14s, background .14s, color .14s, box-shadow .14s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      user-select: none;
    }
    .filter-chip:hover {
      border-color: #c7d2fe;
      background: #f8faff;
      color: #1e293b;
    }
    .filter-chip.active {
      border-color: #6366f1;
      background: #eef2ff;
      color: #4338ca;
      font-weight: 600;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    .filter-chip .chip-label { color: #94a3b8; font-weight: 400; font-size: 11.5px; margin-right: 1px; }
    .filter-chip.active .chip-label { color: #818cf8; }
    .chip-caret {
      width: 14px; height: 14px;
      opacity: .5;
      transition: transform .15s, opacity .15s;
      flex-shrink: 0;
    }
    .filter-chip.active .chip-caret { opacity: 1; }
    .filter-chip-wrap.open .chip-caret { transform: rotate(180deg); }

    /* 清除 × on active chip */
    .chip-clear {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px; height: 14px;
      background: #818cf8;
      border-radius: 50%;
      color: #fff;
      font-size: 9px;
      cursor: pointer;
      margin-left: 1px;
      flex-shrink: 0;
      transition: background .12s;
    }
    .chip-clear:hover { background: #4f46e5; }

    /* ── 下拉面板 ── */
    .chip-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 200px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15,23,42,.1), 0 2px 6px rgba(15,23,42,.06);
      z-index: 200;
      overflow: hidden;
      animation: dropIn .14s cubic-bezier(.22,.61,.36,1);
    }
    .chip-dropdown.open { display: block; }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .dropdown-search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #f1f5f9;
    }
    .dropdown-search svg { color: #94a3b8; flex-shrink: 0; }
    .dropdown-search input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 13px;
      font-family: inherit;
      color: #0f172a;
      background: transparent;
    }
    .dropdown-search input::placeholder { color: #b0bac8; }
    .dropdown-list {
      max-height: 220px;
      overflow-y: auto;
      padding: 6px 0;
    }
    .dropdown-list::-webkit-scrollbar { width: 4px; }
    .dropdown-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 14px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      transition: background .1s;
      white-space: nowrap;
    }
    .dropdown-item:hover { background: #f8faff; }
    .dropdown-item.selected { background: #eef2ff; color: #4338ca; font-weight: 600; }
    .dropdown-item .di-check {
      width: 14px; height: 14px;
      opacity: 0;
      color: #6366f1;
      flex-shrink: 0;
    }
    .dropdown-item.selected .di-check { opacity: 1; }
    .dropdown-empty {
      padding: 14px;
      text-align: center;
      font-size: 12.5px;
      color: #94a3b8;
    }

    /* ── 활성 필터 tag strip (active filters row) ── */
    .active-filters {
      display: none;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .active-filters.visible { display: flex; }
    .af-label {
      font-size: 11.5px;
      color: #94a3b8;
      white-space: nowrap;
    }
    .af-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 8px 0 10px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      font-size: 12px;
      color: #4338ca;
      font-weight: 500;
      cursor: default;
    }
    .af-tag-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px; height: 14px;
      background: #c7d2fe;
      border-radius: 50%;
      color: #4338ca;
      font-size: 9px;
      cursor: pointer;
      border: none;
      transition: background .12s;
      padding: 0;
    }
    .af-tag-x:hover { background: #818cf8; color: #fff; }
    .af-clear-all {
      font-size: 12px;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .12s;
      margin-left: 2px;
    }
    .af-clear-all:hover { color: #dc2626; }

    /* ── 結果列 ── */
    .result-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .result-count {
      font-size: 13px;
      color: #64748b;
    }
    .result-count strong { color: #0f172a; font-weight: 600; }
    .sort-toggle {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #64748b;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background .12s, border-color .12s;
    }
    .sort-toggle:hover { background: #f8fafc; border-color: #cbd5e1; }

    /* ── 隱藏原始 select（保留 DOM 供 JS 讀值） ── */
    .filter-select {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 0; height: 0;
    }

    /* ══ 表格容器 ══ */
    .table-panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .table-wrap { overflow-x: auto; }

    /* ══ 表格 ══ */
    #bookings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      table-layout: auto; /* 欄寬由內容決定，文字多→欄寬大，文字少→欄寬小 */
    }

    /* ── thead 深色底 ── */
    #bookings-table thead {
      background: #0f172a;
    }
    #bookings-table th {
      padding: 13px 16px;
      text-align: left;
      font-size: 10.5px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }
    #bookings-table th:first-child { padding-left: 20px; }

    /* ── tbody ── */
    #bookings-table td {
      padding: 14px 16px;
      vertical-align: top;  /* 多行時靠上對齊 */
      white-space: normal;  /* 允許換行，讓欄寬隨內容量自適應 */
      border-bottom: 1px solid #f1f5f9;
      color: #374151;
      word-break: break-word;
    }
    #bookings-table td:first-child {
      padding-left: 20px;
      border-left: 3px solid transparent;
    }
    #bookings-table tbody tr:last-child td { border-bottom: none; }

    /* ── hover 效果 ── */
    #bookings-table tbody tr:hover td { background: #f8faff; }
    #bookings-table tbody tr:hover td:first-child { border-left-color: #6366f1; }
    #bookings-table tbody tr.editing-row td { background: #f8faff; }
    #bookings-table tbody tr.editing-row td:first-child { border-left-color: #6366f1; }

    /* ── 狀態列左邊色條 ── */
    #bookings-table tbody tr.row-confirmed td:first-child  { border-left-color: #2563eb; }
    #bookings-table tbody tr.row-canceled td:first-child   { border-left-color: #dc2626; }
    #bookings-table tbody tr.row-no_show td:first-child    { border-left-color: #ea580c; }
    #bookings-table tbody tr.row-auto_completed td:first-child { border-left-color: #94a3b8; }

    /* ══ 應徵者 cell（含 avatar）══ */
    .applicant-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .applicant-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0;
    }
    .applicant-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .applicant-name { font-weight: 600; color: #0f172a; font-size: 13.5px; white-space: nowrap; }
    .applicant-email { font-size: 11.5px; color: #94a3b8; word-break: break-all; }
    .applicant-phone { font-size: 11.5px; color: #94a3b8; white-space: nowrap; }

    /* ══ 職缺 cell ══ */
    .position-cell { display: flex; flex-direction: column; gap: 4px; }

    /* ── avatar 顏色循環 ── */
    .av-0 { background: #ede9fe; color: #7c3aed; }
    .av-1 { background: #dbeafe; color: #1d4ed8; }
    .av-2 { background: #dcfce7; color: #15803d; }
    .av-3 { background: #fef9c3; color: #a16207; }
    .av-4 { background: #ffe4e6; color: #be123c; }
    .av-5 { background: #e0f2fe; color: #0369a1; }
    .av-6 { background: #fce7f3; color: #9d174d; }
    .av-7 { background: #f3f4f6; color: #374151; }

    /* ══ 職缺 chip ══ */
    .position-chip {
      display: inline-block;
      padding: 3px 10px;
      background: #f1f5f9;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #334155;
      max-width: 100%;     /* 欄位多寬就用多寬，不再硬限 140px */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }
    .booked-sub {
      font-size: 11px;
      color: #b0bac8;
      padding-left: 2px;
    }

    /* ══ 日期時間 cell ══ */
    .datetime-cell { display: flex; flex-direction: column; gap: 4px; }
    .date-val { font-weight: 600; color: #1e293b; font-size: 13px; white-space: nowrap; }
    .time-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .time-val {
      font-size: 11.5px;
      color: #fff;
      background: #334155;
      border-radius: 4px;
      padding: 1px 6px;
      display: inline-block;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    /* ══ Status badge ══ */
    .sbadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: .01em;
      white-space: nowrap;
    }
    .sbadge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sb-confirmed      { background: #eff6ff; color: #2563eb; }
    .sb-confirmed::before { background: #2563eb; }
    .sb-canceled       { background: #fef2f2; color: #dc2626; }
    .sb-canceled::before { background: #dc2626; }
    .sb-no_show        { background: #fff7ed; color: #ea580c; }
    .sb-no_show::before { background: #ea580c; }
    .sb-auto_completed { background: #f1f5f9; color: #475569; }
    .sb-auto_completed::before { background: #94a3b8; }

    /* ══ 狀態欄：內容固定，保持緊湊 ══ */
    #bookings-table th.col-status,
    #bookings-table td.col-status {
      width: 1%;           /* 盡量縮到最小，由 nowrap 撐開實際寬度 */
      white-space: nowrap;
    }

    /* ══ 操作欄：三個按鈕，固定不換行 ══ */
    #bookings-table th.col-action,
    #bookings-table td.col-action {
      width: 1%;
      white-space: nowrap;
    }

    /* ══ Meet 按鈕 ══ */
    .meet-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #1a73e8;
      color: #fff !important;
      text-decoration: none !important;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      transition: background .12s;
    }
    .meet-btn:hover { background: #1557b0; }
    .meet-none { color: #d1d5db; font-size: 13px; }

    /* ══ 動作按鈕 ══ */
    .action-btns {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .act-btn {
      width: 30px; height: 30px;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s, color .12s;
      color: #64748b;
      flex-shrink: 0;
    }
    .act-btn:hover { background: #f8fafc; border-color: #cbd5e1; color: #374151; }
    .act-btn.edit:hover  { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
    .act-btn.hist:hover  { background: #f0f1ff; border-color: #c7d2fe; color: #6366f1; }
    .act-btn.del:hover   { background: #fef2f2; border-color: #fecaca; color: #dc2626; }

    /* ══ inline 編輯欄位 ══ */
    .edit-input {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color .15s;
    }
    .edit-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.1); }
    .edit-select {
      padding: 6px 26px 6px 9px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #0f172a;
      appearance: none;
      background: #fff url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22 viewBox=%220 0 10 6%22%3E%3Cpath d=%22M1 1l4 4 4-4%22 stroke=%22%23aaa%22 stroke-width=%221.5%22 fill=%22none%22 stroke-linecap=%22round%22/%3E%3C/svg%3E') no-repeat right 8px center;
      outline: none;
      cursor: pointer;
    }
    .edit-select:focus { border-color: #6366f1; }
    .time-edit-wrap { display: flex; align-items: center; gap: 4px; }
    .time-sep { color: #94a3b8; font-size: 12px; }

    .save-btn {
      height: 30px;
      padding: 0 12px;
      border-radius: 7px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background .12s;
      white-space: nowrap;
    }
    .save-btn:hover { background: #4f46e5; }
    .cancel-btn {
      height: 30px;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .12s;
      white-space: nowrap;
    }
    .cancel-btn:hover { background: #f8fafc; }

    /* ══ empty row ══ */
    .empty-row td {
      text-align: center;
      padding: 48px 0;
      color: #94a3b8;
      font-size: 14px;
    }
    .empty-row td .empty-icon {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
    }

    /* ══ 刪除確認 Modal ══ */
    #confirm-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #confirm-modal.open { display: flex; }
    #confirm-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,.45);
      backdrop-filter: blur(3px);
    }
    .confirm-box {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 14px;
      width: 360px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      animation: popIn .18s cubic-bezier(.22,.61,.36,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .confirm-icon {

      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      cursor: pointer;
      transition: background .12s;
    }
    .btn-delete-modal:hover { background: #b91c1c; }

    /* ══ 歷史 Modal ══ */
    #history-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9998;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #history-modal.open { display: flex; }
    #history-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,.45);
      backdrop-filter: blur(3px);
      animation: fadeInBg .18s ease;
    }
    @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
    #history-panel {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 16px;
      width: min(800px, 100%);
      height: min(88vh, 760px);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 1px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.14);
      overflow: hidden;
      animation: slideUp .2s cubic-bezier(.22,.61,.36,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    #history-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid #f1f5f9;

    .h-icon-wrap {

    }

<script>
/* ══ toast ══ */
const toast = (msg, type = 'success') => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' error' : '');
  setTimeout(() => { el.className = ''; }, 2800);
};

/* ══ 狀態 ══ */
let allBookings = [];
let editingRowId = null;
let editOptions = { positions: [], slots: [] };
let deleteTarget = null;
let bookedAtSortDirection = 'asc';

const ALLOWED_TIMES = [
  "09:00","09:30","10:00","10:30","11:00","11:30","12:00",
  "14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"
];

/* ══ Auth ══ */
(async () => {
  try {
    const r = await fetch('/api/hr/me');
    if (!r.ok) window.location.href = '/hr/login';
  } catch { window.location.href = '/hr/login'; }
})();

document.getElementById('logout-btn').addEventListener('click', async e => {
  e.preventDefault();
  await fetch('/api/hr/logout', { method: 'POST' });
  window.location.href = '/hr/login';
});

/* ══ 狀態對照 ══ */
const STATUS_CLS = {
  completed:      'sb-confirmed',
  canceled:       'sb-canceled',
  auto_completed: 'sb-auto_completed',
  no_show:        'sb-no_show',
};
const STATUS_LABEL = {
  completed:      'confirmed',
  canceled:       'canceled',
  auto_completed: 'auto completed',
  no_show:        'no show',
};

/* ══ 時間選單 helpers ══ */
function generateStartTimeOptions(sel) {
  const match = sel ? sel.substring(0, 5) : '';
  let times = [...ALLOWED_TIMES];
  if (match && !times.includes(match)) times.unshift(match);
  return times.map(t => `<option value="${t}" ${t === match ? 'selected' : ''}>${t}</option>`).join('');
}
function generateEndTimeOptions(selEnd, selStart) {
  const matchEnd   = selEnd   ? selEnd.substring(0, 5)   : '';
  const matchStart = selStart ? selStart.substring(0, 5) : '00:00';
  let times = [...ALLOWED_TIMES];
  if (matchEnd && !times.includes(matchEnd)) times.unshift(matchEnd);
  return times.filter(t => t > matchStart)
    .map(t => `<option value="${t}" ${t === matchEnd ? 'selected' : ''}>${t}</option>`).join('');
}
function handleStartTimeChange(id) {
  const sEl = document.getElementById(`edit-start-time-${id}`);
  const eEl = document.getElementById(`edit-end-time-${id}`);
  if (!sEl || !eEl) return;
  eEl.innerHTML = generateEndTimeOptions(eEl.value, sEl.value);
  if (eEl.value <= sEl.value && eEl.options.length > 0) eEl.selectedIndex = 0;
}

/* ══ 篩選下拉 ══ */
function updateFilterOptions(data) {
  const populate = (id, list, def) => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = `<option value="">${def}</option>` +
      list.map(v => `<option value="${v}">${v}</option>`).join('');
    if (list.includes(cur)) el.value = cur;
    el.classList.toggle('active', !!el.value);
  };
  populate('filter-position', [...new Set(data.map(b => b.position_title))].sort(), '所有職缺');
  populate('filter-date',     [...new Set(data.map(b => b.slot_date))].sort(),       '所有面試日期');
  populate('filter-email',    [...new Set(data.map(b => b.applicant_email))].sort(), 'Email 快速選擇');

  // 同步填充 chip dropdown 列表
  // 【修正】同步填充隱藏 <select>，否則 selectDropItem 設定的 value 無法被 select 接受，applyFilter 永遠讀到空值
  const statusEl = document.getElementById('filter-status');
  const statusOpts = [
    { value: 'completed',      label: 'confirmed' },
    { value: 'auto_completed', label: 'auto completed' },
    { value: 'no_show',        label: 'no show' },
    { value: 'canceled',       label: 'canceled' },
  ];
  const curStatus = statusEl.value;
  statusEl.innerHTML = '<option value=""></option>' +
    statusOpts.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
  if (statusOpts.some(o => o.value === curStatus)) statusEl.value = curStatus;

  populateDropdown('filter-status', statusOpts);
  populateDropdown('filter-position', [...new Set(data.map(b => b.position_title))].sort().map(v => ({ value: v, label: v })));
  populateDropdown('filter-date',     [...new Set(data.map(b => b.slot_date))].sort().map(v => ({ value: v, label: v })));
  populateDropdown('filter-name',     [...new Set(data.map(b => b.applicant_name))].sort().map(v => ({ value: v, label: v })));
  populateDropdown('filter-email',    [...new Set(data.map(b => b.applicant_email))].sort().map(v => ({ value: v, label: v })));

  // 渲染所有 chip 狀態
  FILTER_IDS.forEach(id => renderChip(id));
}

function populateDropdown(filterId, items) {
  var list = document.getElementById('dlist-' + filterId);
  if (!list) return;
  var selEl = document.getElementById(filterId);
  var curVal = selEl ? selEl.value : '';
  var checkSvg = '<svg class="di-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var rows = [{ value: '', label: '全部' }].concat(items);
  list.innerHTML = rows.map(function(item) {
    var sel = curVal === item.value ? ' selected' : '';
    return '<div class="dropdown-item' + sel + '" data-filter-id="' + filterId + '" data-value="' + item.value.replace(/"/g, '&quot;') + '">' + checkSvg + '<span>' + item.label + '</span></div>';
  }).join('');
  list.querySelectorAll('.dropdown-item').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      selectDropItem(el.dataset.filterId, el.dataset.value);
    });
  });
}

/* ══ 排序 ══ */
function toggleBookedAtSort() {
  bookedAtSortDirection = bookedAtSortDirection === 'asc' ? 'desc' : 'asc';
  const btn = document.getElementById('sort-booked-btn');
  btn.innerHTML = bookedAtSortDirection === 'asc'
    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> 面試日期（舊→新）`
    : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg> 面試日期（新→舊）`;
  applyFilter();
}

/* ══ 渲染表格 ══ */
function renderTable(data) {
  const tbody = document.getElementById('bookings-body');
  const count = document.getElementById('count-label');
  count.innerHTML = `顯示 <strong>${data.length}</strong> 筆`;

  if (!data.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="5">沒有符合條件的預約</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(b => {
    if (editingRowId === b.id) {
      const posOpts = editOptions.positions
        .map(p => `<option value="${p.id}" ${b.position_id === p.id ? 'selected' : ''}>${p.title}</option>`).join('');
      return `
        <tr class="editing-row">

          <td>
            <div class="applicant-cell">
              <div class="applicant-avatar av-${Math.abs(b.applicant_name.charCodeAt(0) + (b.applicant_name.charCodeAt(1)||0)) % 8}">${(b.applicant_name||'?').slice(0,1).toUpperCase()}</div>
              <div class="applicant-info">
                <input class="edit-input" type="text"  id="edit-name-${b.id}"  value="${b.applicant_name || ''}" placeholder="姓名" style="font-weight:600;width:100%;">
                <input class="edit-input" type="email" id="edit-email-${b.id}" value="${b.applicant_email || ''}" placeholder="Email" style="font-size:12px;width:100%;margin-top:3px;">
                <input class="edit-input" type="text"  id="edit-phone-${b.id}" value="${b.applicant_phone || ''}" placeholder="電話（選填）" style="font-size:12px;width:100%;margin-top:3px;">
              </div>
            </div>
          </td>

          <td>
            <div class="position-cell">
              <select class="edit-select" id="edit-position-${b.id}" style="width:100%;max-width:200px;">${posOpts}</select>
              ${b.booked_at ? `<span class="booked-sub">建立預約: ${b.booked_at.slice(0,10)}</span>` : ''}
            </div>
          </td>

          <td>
            <div class="datetime-cell">
              <input class="edit-input" type="date" id="edit-date-${b.id}" value="${b.slot_date || ''}" style="font-weight:600;font-size:13px;width:100%;max-width:160px;">
              <div class="time-row">
                <select class="edit-select" id="edit-start-time-${b.id}" onchange="handleStartTimeChange('${b.id}')" style="width:78px;">${generateStartTimeOptions(b.start_time)}</select>
                <span class="time-sep">–</span>
                <select class="edit-select" id="edit-end-time-${b.id}" style="width:78px;">${generateEndTimeOptions(b.end_time, b.start_time)}</select>
              </div>
              <input class="edit-input" type="url" id="edit-meet-link-${b.id}" value="${b.google_meet_link || ''}" placeholder="Meet 連結（選填）" style="font-size:11.5px;width:100%;max-width:220px;margin-top:3px;">
            </div>
          </td>

          <!-- td4：狀態（對應顯示列的 sbadge） -->
          <td class="col-status">
            <select class="edit-select" id="edit-status-${b.id}" style="width:100%;max-width:140px;">
              <option value="completed"      ${b.status==='completed'?'selected':''}>confirmed</option>
              <option value="auto_completed" ${b.status==='auto_completed'?'selected':''}>auto completed</option>
              <option value="no_show"        ${b.status==='no_show'?'selected':''}>no show</option>
              <option value="canceled"       ${b.status==='canceled'?'selected':''}>canceled</option>
            </select>
          </td>

          <!-- td5：操作（儲存/取消） -->
          <td class="col-action">
            <div class="action-btns">
              <button class="save-btn" onclick="saveBookingEdit('${b.id}')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                儲存
              </button>
              <button class="cancel-btn" onclick="editingRowId=null;applyFilter()">取消</button>
            </div>
          </td>
        </tr>`;
    }

    return `
      <tr class="row-${b.status === 'completed' ? 'confirmed' : b.status}">
        <td>
          <div class="applicant-cell">
            <div class="applicant-avatar av-${Math.abs(b.applicant_name.charCodeAt(0) + (b.applicant_name.charCodeAt(1)||0)) % 8}">${(b.applicant_name||'?').slice(0,1).toUpperCase()}</div>
            <div class="applicant-info">
              <span class="applicant-name">${b.applicant_name}</span>
              <span class="applicant-email">${b.applicant_email}</span>
              ${b.applicant_phone ? `<span class="applicant-phone">${b.applicant_phone}</span>` : ''}
            </div>
          </div>
        </td>
        <td>
          <div class="position-cell">
            <span class="position-chip">${b.position_title || '—'}</span>
           ${b.booked_at ? `<span class="booked-sub"> 建立預約: ${b.booked_at.slice(0,10)}</span>` : ''}
          </div>
        </td>
        <td>
          <div class="datetime-cell">
            <span class="date-val">${b.slot_date || '—'}</span>
            <div class="time-row">
              <span class="time-val">${b.start_time ? b.start_time.substring(0,5) : ''} – ${b.end_time ? b.end_time.substring(0,5) : ''}</span>
              ${b.google_meet_link
                ? `<a href="${b.google_meet_link}" target="_blank" rel="noopener noreferrer" class="meet-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.889L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>
                   </a>`
                : ''}
            </div>
          </div>
        </td>
        <td class="col-status">
          <span class="sbadge ${STATUS_CLS[b.status] || ''}">${STATUS_LABEL[b.status] || b.status}</span>
        </td>
        <td class="col-action">
          <div class="action-btns">
            <button class="act-btn edit" title="編輯" onclick="editingRowId='${b.id}';applyFilter()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
            </button>
            <button class="act-btn hist" title="編輯歷史" onclick="openHistoryModal('${b.id}','${b.applicant_name}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </button>
            <button class="act-btn del" title="刪除" onclick="askDeleteBooking('${b.id}','${b.applicant_name}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

/* ══ 篩選邏輯 ══ */
function applyFilter() {
  const status   = document.getElementById('filter-status').value;
  const position = document.getElementById('filter-position').value;
  const slotDate = document.getElementById('filter-date').value;
  const nameSel  = document.getElementById('filter-name').value;
  const emailSel = document.getElementById('filter-email').value;
  const kw       = document.getElementById('keyword-search').value.toLowerCase().trim();

  // active 樣式
  ['filter-status','filter-position','filter-date','filter-name','filter-email'].forEach(id => {
    document.getElementById(id).classList.toggle('active', !!document.getElementById(id).value);
  });

  let filtered = allBookings.filter(b =>
    (!status   || b.status === status) &&
    (!position || b.position_title === position) &&
    (!slotDate || b.slot_date === slotDate) &&
    (!nameSel  || b.applicant_name === nameSel) &&
    (!emailSel || b.applicant_email === emailSel) &&
    (!kw || b.applicant_name.toLowerCase().includes(kw) ||
            b.applicant_email.toLowerCase().includes(kw) ||
            (b.applicant_phone || '').toLowerCase().includes(kw))
  );

  filtered.sort((a, b) => {
    const tA = a.slot_date && a.start_time ? new Date(`${a.slot_date}T${a.start_time}`).getTime() : 0;
    const tB = b.slot_date && b.start_time ? new Date(`${b.slot_date}T${b.start_time}`).getTime() : 0;
    return bookedAtSortDirection === 'asc' ? tA - tB : tB - tA;
  });

  renderTable(filtered);
}

/* ══ 篩選事件 ══ */
['filter-status','filter-position','filter-date','filter-name','filter-email'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilter)
);
document.getElementById('keyword-search').addEventListener('input', e => {
  const v = e.target.value;
  document.getElementById('search-clear').style.display = v ? 'flex' : 'none';
  e.target.classList.toggle('has-value', !!v);
  applyFilter();
});
document.getElementById('search-clear').addEventListener('click', () => {
  const inp = document.getElementById('keyword-search');
  inp.value = '';
  inp.classList.remove('has-value');
  document.getElementById('search-clear').style.display = 'none';
  applyFilter();
});

/* ══ Chip dropdown 互動 ══ */
const FILTER_IDS = ['filter-status','filter-position','filter-date','filter-name','filter-email'];
const CHIP_LABELS = {
  'filter-status':   '狀態',
  'filter-position': '職缺',
  'filter-date':     '面試日期',
  'filter-name':     '姓名',
  'filter-email':    'Email',
};
const STATUS_DISPLAY = {
  completed: 'confirmed', auto_completed: 'auto completed',
  no_show: 'no show', canceled: 'canceled',
};

/* 開/關 dropdown */
function openChipDrop(filterId) {
  FILTER_IDS.forEach(id => {
    const wrap = document.querySelector(`.filter-chip-wrap[data-filter="${id}"]`);
    const drop = document.getElementById(`drop-${id}`);
    if (!wrap || !drop) return;
    if (id === filterId) {
      const isOpen = drop.classList.contains('open');
      drop.classList.toggle('open', !isOpen);
      wrap.classList.toggle('open', !isOpen);
    } else {
      drop.classList.remove('open');
      wrap.classList.remove('open');
    }
  });
}
function closeAllDrops() {
  FILTER_IDS.forEach(id => {
    document.getElementById(`drop-${id}`)?.classList.remove('open');
    document.querySelector(`.filter-chip-wrap[data-filter="${id}"]`)?.classList.remove('open');
  });
}

/* 點擊 chip 按鈕 */
FILTER_IDS.forEach(id => {
  const chip = document.getElementById(`chip-${id}`);
  if (chip) chip.addEventListener('click', e => {
    e.stopPropagation();
    openChipDrop(id);
  });
});

/* 點擊空白關閉 */
document.addEventListener('click', closeAllDrops);
document.querySelectorAll('.chip-dropdown').forEach(d =>
  d.addEventListener('click', e => e.stopPropagation())
);

/* dropdown 內部搜尋 */
document.querySelectorAll('[data-search-for]').forEach(input => {
  input.addEventListener('input', e => {
    const filterId = e.target.dataset.searchFor;
    const kw = e.target.value.toLowerCase();
    document.querySelectorAll(`#dlist-${filterId} .dropdown-item`).forEach(item => {
      item.style.display = item.dataset.value.toLowerCase().includes(kw) ? '' : 'none';
    });
  });
});

/* 選取 dropdown 項目 */
function selectDropItem(filterId, value) {
  const sel = document.getElementById(filterId);
  sel.value = value;
  sel.dispatchEvent(new Event('change'));
  closeAllDrops();
  renderChip(filterId);
  renderActiveFilters();
}

/* 渲染單一 chip 狀態 */
function renderChip(filterId) {
  const sel   = document.getElementById(filterId);
  const val   = sel?.value || '';
  const chip  = document.getElementById(`chip-${filterId}`);
  const valEl = document.getElementById(`chipval-${filterId}`);
  if (!chip || !valEl) return;

  // 顯示文字
  let display = '';
  if (val) {
    display = filterId === 'filter-status'
      ? (STATUS_DISPLAY[val] || val)
      : val;
  }
  valEl.textContent = display ? ` ${display}` : '';
  chip.classList.toggle('active', !!val);

  // 更新 dropdown list 選中狀態
  document.querySelectorAll(`#dlist-${filterId} .dropdown-item`).forEach(item => {
    item.classList.toggle('selected', item.dataset.value === val);
  });
}

/* 渲染 active filters strip */
function renderActiveFilters() {
  const strip = document.getElementById('active-filters-strip');
  const tags = [];
  FILTER_IDS.forEach(id => {
    const val = document.getElementById(id)?.value;
    if (!val) return;
    const label = CHIP_LABELS[id];
    const display = id === 'filter-status' ? (STATUS_DISPLAY[val] || val) : val;
    tags.push({ id, label, val, display });
  });
  const kw = document.getElementById('keyword-search').value.trim();
  if (kw) tags.push({ id: 'kw', label: '搜尋', val: kw, display: kw });

  if (!tags.length) {
    strip.classList.remove('visible');
    strip.innerHTML = '';
    return;
  }
  strip.classList.add('visible');
  strip.innerHTML =
    `<span class="af-label">已篩選：</span>` +
    tags.map(t => `
      <span class="af-tag">
        <span style="color:#818cf8;font-size:11px;margin-right:2px">${t.label}</span>${t.display}
        <button class="af-tag-x" onclick="clearFilter('${t.id}')" title="移除">✕</button>
      </span>`).join('') +
    `<button class="af-clear-all" onclick="clearAllFilters()">全部清除</button>`;
}

/* 清除單一篩選 */
function clearFilter(id) {
  if (id === 'kw') {
    document.getElementById('keyword-search').value = '';
    document.getElementById('keyword-search').classList.remove('has-value');
    document.getElementById('search-clear').style.display = 'none';
  } else {
    document.getElementById(id).value = '';
  }
  renderChip(id);
  renderActiveFilters();
  applyFilter();
}

/* 清除全部篩選 */
function clearAllFilters() {
  FILTER_IDS.forEach(id => { document.getElementById(id).value = ''; renderChip(id); });
  document.getElementById('keyword-search').value = '';
  document.getElementById('keyword-search').classList.remove('has-value');
  document.getElementById('search-clear').style.display = 'none';
  renderActiveFilters();
  applyFilter();
}

/* ══ 重置按鈕（相容舊 ID） ══ */
// reset-filters-btn 已從 HTML 移除，clearAllFilters() 直接呼叫

/* ══ 載入 ══ */
async function loadBookings() {
  try {
    const [bRes, oRes] = await Promise.all([
      fetch('/api/bookings'),
      fetch('/api/booking-edit-options'),
    ]);
    if (!bRes.ok || !oRes.ok) { window.location.href = '/hr/login'; return; }
    allBookings = await bRes.json();
    editOptions = await oRes.json();
    updateFilterOptions(allBookings);
    applyFilter();
  } catch(err) {
    console.error(err);
    toast('載入預約失敗', 'error');
  }
}

/* ══ 刪除 ══ */
function askDeleteBooking(id, name) {
  deleteTarget = { id, name };
  document.getElementById('confirm-modal-text').textContent = `確定要刪除「${name}」的預約紀錄？此操作不可復原。`;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('open');
  deleteTarget = null;
}
document.getElementById('confirm-backdrop').addEventListener('click', closeConfirmModal);
document.getElementById('modal-confirm-btn').onclick = async () => {
  if (!deleteTarget) return;
  const { id, name } = deleteTarget;
  const res = await fetch(`/api/bookings/${id}`, { method: 'DELETE' });
  closeConfirmModal();
  if (res.ok) { toast(`已刪除 ${name} 的預約`); loadBookings(); }
  else toast('刪除失敗', 'error');
};

/* ══ 儲存編輯 ══ */
async function saveBookingEdit(id) {
  const get = sel => document.getElementById(sel)?.value ?? '';
  const applicant_name  = get(`edit-name-${id}`);
  const applicant_email = get(`edit-email-${id}`);
  const phone           = get(`edit-phone-${id}`);
  const position_id     = get(`edit-position-${id}`);
  const slot_date       = get(`edit-date-${id}`);
  const start_time      = get(`edit-start-time-${id}`);
  const end_time        = get(`edit-end-time-${id}`);
  const google_meet_link= get(`edit-meet-link-${id}`);
  const status          = get(`edit-status-${id}`);

  if (!applicant_name.trim())          { toast('應徵者名字不能為空', 'error'); return; }
  if (!applicant_email.trim())         { toast('Email 不能為空', 'error'); return; }
  if (!slot_date)                      { toast('面試日期不能為空', 'error'); return; }
  if (!start_time || !end_time)        { toast('面試時間不能為空', 'error'); return; }
  if (start_time >= end_time)          { toast('結束時間必須大於開始時間', 'error'); return; }

  const res = await fetch(`/api/bookings/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ applicant_name, applicant_email, applicant_phone: phone,
      position_id, slot_date, start_time, end_time, google_meet_link, status }),
  });
  if (res.ok) {
    toast('預約已更新');
    editingRowId = null;
    loadBookings();
  } else {
    const err = await res.json().catch(() => ({}));
    toast(err.detail || '更新失敗', 'error');
  }
}

/* ══ 匯出 ══ */
function exportBookings() {
  const p = new URLSearchParams();
  const v = id => document.getElementById(id).value;
  if (v('filter-status'))   p.append('status',   v('filter-status'));
  if (v('filter-position')) p.append('position', v('filter-position'));
  if (v('filter-name'))     p.append('name',     v('filter-name'));
  if (v('filter-email'))    p.append('email',    v('filter-email'));
  const kw = document.getElementById('keyword-search').value.trim();
  if (kw) p.append('keyword', kw);
  window.location.href = '/api/bookings/export-file?' + p.toString();
}
document.getElementById('export-btn').addEventListener('click', exportBookings);

/* ══ 歷史 Modal ══ */
function openHistoryModal(id, name) {
  document.getElementById('history-iframe').src = '/hr/bookings/history?id=' + id;
  document.getElementById('history-modal-sub').textContent = name ? name + ' 的預約' : 'ID: ' + id;
  document.getElementById('history-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeHistoryModal() {
  document.getElementById('history-modal').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('history-iframe').src = ''; }, 250);
}
document.getElementById('history-backdrop').addEventListener('click', closeHistoryModal);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeHistoryModal();
    closeConfirmModal();
  }
});

loadBookings();
</script>
