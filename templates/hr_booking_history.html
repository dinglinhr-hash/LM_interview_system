<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編輯歷史 — Interview Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- [修改6] 移除 /static/css/style.css 外部依賴，讓頁面可獨立執行 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      font-size: 13px;
      background: #f8f9fb;
      color: #1a1d23;
      height: 100%;
    }

    /* ══════════════════════════════════════
       面板頂部資訊列
    ══════════════════════════════════════ */
    .panel-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #e4e7ed;
      padding: 16px 24px 14px;
    }
    .panel-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .panel-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -.01em;
    }
    .panel-count {
      margin-left: auto;
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 3px 10px;
      border-radius: 999px;
    }

    /* 應徵者資訊條 */
    .applicant-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .applicant-name {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .strip-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #4b5563;
      background: #f3f4f6;
      border-radius: 6px;
      padding: 3px 10px;
    }
    .strip-chip svg { flex-shrink: 0; }

    /* ══════════════════════════════════════
       時間軸
    ══════════════════════════════════════ */
    .timeline-wrap {
      padding: 20px 24px 32px;
    }
    .timeline {
      position: relative;
      padding-left: 36px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 6px;
      bottom: 6px;
      width: 1.5px;
      background: linear-gradient(to bottom, #d1d5db 0%, #e5e7eb 100%);
    }

    /* ── 節點 ── */
    .tl-item {
      position: relative;
      margin-bottom: 16px;
    }
    .tl-dot {
      position: absolute;
      left: -29px;
      top: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ca3af;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1.5px #d1d5db;
      transition: transform .15s;
    }
    .tl-item:hover .tl-dot { transform: scale(1.3); }

    .tl-dot.dot-created   { background: #22c55e; box-shadow: 0 0 0 1.5px #86efac; }
    .tl-dot.dot-current   { background: #3b82f6; box-shadow: 0 0 0 1.5px #93c5fd; }
    .tl-dot.dot-canceled  { background: #ef4444; box-shadow: 0 0 0 1.5px #fca5a5; }
    .tl-dot.dot-no_show   { background: #f97316; box-shadow: 0 0 0 1.5px #fdba74; }
    .tl-dot.dot-completed { background: #3b82f6; box-shadow: 0 0 0 1.5px #93c5fd; }
    .tl-dot.dot-auto_completed { background: #6b7280; box-shadow: 0 0 0 1.5px #d1d5db; }

    /* ── 卡片 ── */
    .tl-card {
      background: #fff;
      border: 1px solid #e4e7ed;
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow .15s, border-color .15s;
    }
    .tl-card:hover {
      border-color: #c7d2fe;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .tl-card.card-created {
      border-color: #bbf7d0;
      background: linear-gradient(135deg, #f0fdf4 0%, #fff 60%);
    }
    .tl-card.card-current {
      border-color: #bfdbfe;
      background: linear-gradient(135deg, #eff6ff 0%, #fff 60%);
    }

    /* 卡片 header 列 */
    .tl-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 11px 16px;
      border-bottom: 1px solid #f3f4f6;
    }
    .tl-card.card-created .tl-card-head { border-bottom-color: #dcfce7; }
    .tl-card.card-current .tl-card-head { border-bottom-color: #dbeafe; }

    .tl-label {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .tl-label.lbl-created { background: #dcfce7; color: #15803d; }
    .tl-label.lbl-current { background: #dbeafe; color: #1d4ed8; }
    .tl-label.lbl-seq     { background: #f3f4f6; color: #6b7280; }

    .tl-status-flow {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
    }
    .tl-arrow { color: #9ca3af; font-size: 10px; }

    .tl-editor {
      font-size: 11px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tl-time {
      margin-left: auto;
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    /* ── 欄位資料區 ── */
    .tl-body {
      padding: 12px 16px;
    }

    /* 變更描述句列表 */
    .change-desc-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 4px;
    }
    .change-desc-item {
      font-size: 12.5px;
      color: #374151;
      line-height: 1.6;
    }
    .change-desc-item .desc-field {
      font-weight: 600;
      color: #111827;
    }
    .change-desc-item .desc-from {
      color: #991b1b;
      font-weight: 500;
    }
    .change-desc-item .desc-to {
      color: #166534;
      font-weight: 600;
    }
    .change-desc-item .desc-to a {
      color: #166534;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .field-val a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* 靜態欄位表格（無變更） */
    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 4px 16px;
    }
    .field-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
      font-size: 12px;
      padding: 3px 0;
    }
    .field-label {
      color: #6b7280;
      min-width: 64px;
      flex-shrink: 0;
    }
    .field-val { color: #111827; }

    /* ── 狀態 badge ── */
    .sbadge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: .01em;
    }
    .sb-confirmed      { background: #dbeafe; color: #1d4ed8; }
    .sb-canceled,
    .sb-no_show        { background: #fee2e2; color: #991b1b; }
    .sb-completed,
    .sb-auto_completed { background: #f3f4f6; color: #374151; }

    /* ── 空白狀態 ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #9ca3af;
    }
    .empty-state .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }

    /* [修改5] 無歷史提示文字 */
    .no-history-hint {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
    }

    /* ── 載入骨架 ── */
    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 14px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<!-- ── 面板頂部 ── -->
<div class="panel-header">
  <div class="panel-header-top">
    <!-- [修改1] 新增頁面標題 -->
    <span id="panel-count" class="panel-count">載入中…</span>
  </div>
  <div id="applicant-strip" class="applicant-strip">
    <!-- 骨架 -->
    <div class="skeleton" style="width:80px;height:16px;border-radius:8px;"></div>
    <div class="skeleton" style="width:140px;height:14px;border-radius:8px;"></div>
    <div class="skeleton" style="width:160px;height:14px;border-radius:8px;"></div>
  </div>
</div>

<!-- ── 時間軸 ── -->
<div class="timeline-wrap">
  <div id="timeline-root">
    <!-- 骨架卡片 -->
    <div style="padding-left:36px;position:relative;">
      <div style="background:#fff;border:1px solid #e4e7ed;border-radius:10px;padding:14px 16px;margin-bottom:14px;">
        <div class="skeleton" style="width:60%;margin-bottom:10px;"></div>
        <div class="skeleton" style="width:40%;height:11px;"></div>
      </div>
      <div style="background:#fff;border:1px solid #e4e7ed;border-radius:10px;padding:14px 16px;margin-bottom:14px;">
        <div class="skeleton" style="width:50%;margin-bottom:10px;"></div>
        <div class="skeleton" style="width:70%;height:11px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   常數
══════════════════════════════════════ */
const STATUS_LABEL = {
  completed:      'confirmed',
  auto_completed: 'auto completed',
  no_show:        'no show',
  canceled:       'canceled',
};
const STATUS_CLS = {
  completed:      'sb-confirmed',
  auto_completed: 'sb-auto_completed',
  no_show:        'sb-no_show',
  canceled:       'sb-canceled',
};
const FIELD_LABELS = {
  applicant_name:  '姓名',
  applicant_email: 'Email',
  applicant_phone: '電話',
  slot_date:       '日期',
  start_time:      '開始',
  end_time:        '結束',
  google_meet_link:'Meet',
  status_before:   '狀態',
};
const DIFF_KEYS = [
  'applicant_name','applicant_email','applicant_phone',
  'slot_date','start_time','end_time','google_meet_link',
];

/* ── helpers ── */
const params     = new URLSearchParams(location.search);
const bookingId  = params.get('id');

function sbadge(status) {
  if (!status) return '<span style="color:#ccc">—</span>';
  return `<span class="sbadge ${STATUS_CLS[status] || ''}">${STATUS_LABEL[status] || status}</span>`;
}
function fmt(v) {
  if (v === null || v === undefined || v === '') return '';
  return String(v);
}
function fmtTime(v) {
  return v ? v.substring(0, 5) : '';
}
function fmtTs(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-TW', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', hour12:false,
  });
}

/* ── diff ── */
function diffFields(prev, curr) {
  const changed = new Set();
  if (!prev) return changed;
  DIFF_KEYS.forEach(k => {
    if (String(prev[k] ?? '') !== String(curr[k] ?? '')) changed.add(k);
  });
  if (prev.status_before !== curr.status_before) changed.add('status_before');
  return changed;
}

/* ── 欄位顯示值（純文字，供描述句使用）── */
function fieldVal(key, row, asHtml = false) {
  if (key === 'start_time') return fmtTime(row.start_time);
  if (key === 'end_time')   return fmtTime(row.end_time);
  if (key === 'google_meet_link') {
    if (!row.google_meet_link) return '';
    return asHtml
      ? `<a href="${row.google_meet_link}" target="_blank" rel="noopener">開啟 Meet</a>`
      : '有連結';
  }
  if (key === 'status_before') return STATUS_LABEL[row.status_before] || row.status_before || '';
  return fmt(row[key]);
}

/* ── 欄位的中文完整描述名稱 ── */
const FIELD_DESC = {
  applicant_name:  '姓名',
  applicant_email: 'Email',
  applicant_phone: '電話',
  slot_date:       '面試日期',
  start_time:      '開始時間',
  end_time:        '結束時間',
  google_meet_link:'Meet 會議連結',
  status_before:   '預約狀態',
};

/* ── 狀態的中文完整說明 ── */
const STATUS_DESC = {
  completed:      '面試者完成預約',
  auto_completed: '自動偵測完成面試',
  no_show:        '面試者未出席',
  canceled:       '面試者已取消預約',
};

/* ── 將單一欄位變更轉為一句自然語言 ── */
function describeChange(key, prevRow, currRow) {
  const fieldName = FIELD_DESC[key] || FIELD_LABELS[key] || key;

  // 狀態欄位用中文完整說明
  if (key === 'status_before') {
    const from = STATUS_DESC[prevRow?.status_before] || prevRow?.status_before || '（無）';
    const to   = STATUS_DESC[currRow.status_before]  || currRow.status_before  || '（無）';
    return `將<span class="desc-field">「${fieldName}」</span>從 <span class="desc-from">「${from}」</span> 改為 <span class="desc-to">「${to}」</span>`;
  }

  // Meet 連結
  if (key === 'google_meet_link') {
    const hadLink = !!prevRow?.google_meet_link;
    const hasLink = !!currRow.google_meet_link;
    if (hadLink && !hasLink) {
      return `移除了<span class="desc-field">「${fieldName}」</span>`;
    }
    if (!hadLink && hasLink) {
      return `新增了<span class="desc-field">「${fieldName}」</span>：<span class="desc-to"><a href="${currRow.google_meet_link}" target="_blank" rel="noopener">開啟 Meet</a></span>`;
    }
    return `更新了<span class="desc-field">「${fieldName}」</span>`;
  }

  const from = fieldVal(key, prevRow) || '（空白）';
  const to   = fieldVal(key, currRow) || '（清空）';
  return `將<span class="desc-field">「${fieldName}」</span>從 <span class="desc-from">「${from}」</span> 改為 <span class="desc-to">「${to}」</span>`;
}

/* ══════════════════════════════════════
   渲染：單一歷史節點
══════════════════════════════════════ */
function renderCard(row, prevRow, isFirst, isCurrent) {
  const changedKeys = isFirst ? new Set() : diffFields(prevRow, row);

  // 點的樣式
  let dotCls = 'tl-dot';
  if (isFirst) dotCls += ' dot-created';
  else if (isCurrent) dotCls += ' dot-current';
  else dotCls += ` dot-${row.status_before || ''}`;

  // 卡片樣式
  let cardCls = 'tl-card';
  if (isFirst) cardCls += ' card-created';
  else if (isCurrent) cardCls += ' card-current';

  // label
  let labelHtml = '';
  if (isFirst)         labelHtml = '<span class="tl-label lbl-created">建立</span>';
  else if (isCurrent)  labelHtml = '<span class="tl-label lbl-current">目前最新</span>';
  else                 labelHtml = `<span class="tl-label lbl-seq">#${row._seq}</span>`;

  // 狀態流
  let statusFlowHtml = '';
  if (row.status_after && row.status_after !== row.status_before) {
    statusFlowHtml = `<span class="tl-status-flow">${sbadge(row.status_before)}<span class="tl-arrow">▶</span>${sbadge(row.status_after)}</span>`;
  } else {
    statusFlowHtml = sbadge(row.status_before || row.status);
  }

  // 操作者
  const editorHtml = row.changed_by
    ? `<span class="tl-editor"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>${row.changed_by}</span>` : '';

  const timestamp = fmtTs(row.changed_at || row.updated_at);

  // 內容：變更描述句 或靜態欄位
  let bodyHtml = '';
  if (!isFirst && changedKeys.size > 0) {
    const items = [...changedKeys].map(key => {
      const sentence = describeChange(key, prevRow, row);
      return `<div class="change-desc-item">${sentence}</div>`;
    }).join('');
    bodyHtml = `<div class="change-desc-list">${items}</div>`;
  } else {
    // 顯示完整靜態欄位
    const data = row.booking || row;
    const fieldPairs = [
      ['applicant_name',  fmt(data.applicant_name)],
      ['applicant_email', fmt(data.applicant_email)],
      ['applicant_phone', fmt(data.applicant_phone)],
      ['slot_date',       fmt(data.slot_date)],
      ['start_time',      fmtTime(data.start_time)],
      ['end_time',        fmtTime(data.end_time)],
      // [修改3] Meet 欄位顯示為可點擊連結
      ['google_meet_link', data.google_meet_link
        ? `<a href="${data.google_meet_link}" target="_blank" rel="noopener">開啟 Meet</a>`
        : ''],    ].filter(([, v]) => v);

    bodyHtml = `<div class="fields-grid">${fieldPairs.map(([k, v]) =>
      `<div class="field-row"><span class="field-label">${FIELD_LABELS[k]}</span><span class="field-val">${v}</span></div>`
    ).join('')}</div>`;
  }

  return `
    <div class="tl-item">
      <div class="${dotCls}"></div>
      <div class="${cardCls}">
        <div class="tl-card-head">
          ${labelHtml}
          ${statusFlowHtml}
          ${editorHtml}
          <span class="tl-time">${timestamp}</span>
        </div>
        <div class="tl-body">${bodyHtml}</div>
      </div>
    </div>`;
}

/* 最新主表卡 */
function renderCurrentCard(booking, lastHistory) {
  const proxy = {
    applicant_name:  booking.applicant_name,
    applicant_email: booking.applicant_email,
    applicant_phone: booking.applicant_phone,
    slot_date:       booking.slot_date,
    start_time:      booking.start_time,
    end_time:        booking.end_time,
    google_meet_link: booking.google_meet_link,
    status_before:   booking.status,
    updated_at:      booking.updated_at,
  };
  return renderCard(proxy, lastHistory, false, true);
}

/* ══════════════════════════════════════
   主載入
══════════════════════════════════════ */
async function loadHistory() {
  if (!bookingId) {
    document.getElementById('timeline-root').innerHTML =
      `<div class="empty-state"><span class="empty-icon">⚠️</span>未指定預約 ID，請從列表進入。</div>`;
    return;
  }

  try {
    const [histRes, bkRes] = await Promise.all([
      fetch(`/api/bookings/${bookingId}/history`),
      fetch(`/api/bookings`),
    ]);
    if (histRes.status === 401) { window.location.href = '/hr/login'; return; }

    const historyRows = histRes.ok ? await histRes.json() : [];
    const allBookings = bkRes.ok  ? await bkRes.json()  : [];
    const booking     = allBookings.find(b => b.id === bookingId);

    /* ── 應徵者資訊列 ── */
    const strip = document.getElementById('applicant-strip');
    if (booking) {
      // [修改2] 新增姓名顯示在最前面
      strip.innerHTML = `
        <span class="strip-chip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${booking.slot_date || '—'}&nbsp;
          ${booking.start_time ? booking.start_time.substring(0,5) : ''} – ${booking.end_time ? booking.end_time.substring(0,5) : ''}
        </span>
        ${booking.position_title ? `<span class="strip-chip">${booking.position_title}</span>` : ''}
        <span class="strip-chip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          ${booking.applicant_email || ''}
        </span>
        ${sbadge(booking.status)}`;
    } else {
      strip.innerHTML = `<span style="color:#9ca3af;font-size:12px">ID: ${bookingId}</span>`;
    }

    /* ── 計數 ── */
    document.getElementById('panel-count').textContent =
      historyRows.length === 0 ? '尚無變更' : `${historyRows.length} 筆變更`;

    /* ── 空白狀態 ── */
    if (historyRows.length === 0 && !booking) {
      document.getElementById('timeline-root').innerHTML =
        `<div class="empty-state"><span class="empty-icon">📭</span>此預約尚無任何編輯歷史。</div>`;
      return;
    }

    historyRows.forEach((r, i) => { r._seq = i; });

    let html = '<div class="timeline">';
    if (historyRows.length === 0) {
      // [修改5] 補上提示說明文字
      if (booking) {
        html += `<p class="no-history-hint">⚠️ 此預約尚無編輯歷史，以下為目前狀態。</p>`;
        html += renderCurrentCard(booking, null);
      }
    } else {
      historyRows.forEach((row, i) => {
        html += renderCard(row, i > 0 ? historyRows[i-1] : null, i === 0, false);
      });
      if (booking) html += renderCurrentCard(booking, historyRows[historyRows.length - 1]);
    }
    html += '</div>';
    document.getElementById('timeline-root').innerHTML = html;

  } catch(err) {
    console.error(err);
    document.getElementById('timeline-root').innerHTML =
      `<div class="empty-state"><span class="empty-icon">⚠️</span>載入失敗，請關閉後重試。</div>`;
  }
}
